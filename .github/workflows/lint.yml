name: Lint

on:
  push:
    branches:
      - master
      - 'dev-**'
  pull_request:
    branches:
      - master

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dev dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: web-ext lint
        run: npm run lint:ext
