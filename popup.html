<!-- popup.html -->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline';" />
    <style>
      body {
        font-family: sans-serif;
        margin: 10px;
        min-width: 180px;
      }
      ul {
        list-style: none;
        padding: 0;
        margin: 0;
      }
      li {
        padding: 6px 10px;
        cursor: default;
        border-radius: 4px;
      }
      .selected::after {
        content: " ✓";
        color: green;
      }
      .review-prompt {
        margin: 8px 0 2px;
        padding: 4px 10px;
        font-size: 0.85em;
        text-align: center;
      }
      .review-prompt a {
        color: #0060df;
        text-decoration: none;
      }
      .review-prompt a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <ul id="mode-list" aria-live="polite"></ul>
    <script src="utils.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
